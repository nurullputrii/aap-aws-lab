---
plugin: amazon.aws.aws_ec2
regions:
  - "{{ aws_region }}"
keyed_groups:
  - key: placement.region
    prefix: aws_region
  - key: tags.Env
    prefix: env
  - key: tags.Project
    prefix: project
hostnames:
  - private-ip-address
host_options:
  ansible_user: ec2-user
  ansible_ssh_private_key_file: "~/.ssh/{{ aws_key_pair_name }}.pem"
