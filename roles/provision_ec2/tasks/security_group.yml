---
- name: Create EC2 security group
  become: false
  amazon.aws.ec2_security_group:
    name: "{{ ec2_tag_project }}-sg"
    description: "AAP lab security group"
    vpc_id: "{{ aws_vpc_id }}"
    region: "{{ aws_region }}"
    access_key: "{{ vault_aws_access_key }}"
    secret_key: "{{ vault_aws_secret_key }}"
    rules:
      - proto: tcp
        ports: [22, 80, 443]
        cidr_ip: 0.0.0.0/0
    state: present
  register: provision_ec2_sg_result
